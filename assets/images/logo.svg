<svg viewBox="0 0 180 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Light version: Cream on transparent (for dark theme) -->

  <!-- Geometric mark: Outer cream square, inner champagne gold square -->
  <g id="mark">
    <rect x="2" y="4" width="20" height="20" fill="none" stroke="#f5f0e8" stroke-width="0.8"/>
    <rect x="5" y="7" width="14" height="14" fill="none" stroke="#c9a96e" stroke-width="0.6" opacity="0.8"/>
  </g>

  <!-- THE (smaller) -->
  <text x="28" y="10" font-family="Cormorant Garamond, serif" font-size="8" font-weight="300" letter-spacing="0.8" fill="#f5f0e8">THE</text>

  <!-- WALLS (larger) -->
  <text x="28" y="28" font-family="Cormorant Garamond, serif" font-size="16" font-weight="400" letter-spacing="1.2" fill="#f5f0e8">WALLS</text>

  <!-- Champagne gold accent underline -->
  <line x1="28" y1="30" x2="80" y2="30" stroke="#c9a96e" stroke-width="0.5" opacity="0.5"/>
</svg>
