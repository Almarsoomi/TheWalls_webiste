<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Favicon: Geometric mark only, 32×32 -->
  <!-- Champagne gold color for visibility -->
  
  <!-- Outer square frame -->
  <rect x="2" y="2" width="28" height="28" fill="none" stroke="#c9a96e" stroke-width="1.2"/>
  
  <!-- Inner square -->
  <rect x="6" y="6" width="20" height="20" fill="none" stroke="#c9a96e" stroke-width="0.8" opacity="0.7"/>
  
  <!-- Diagonal accent lines forming abstract W -->
  <line x1="12" y1="6" x2="12" y2="26" stroke="#c9a96e" stroke-width="1" opacity="0.5"/>
  <line x1="20" y1="6" x2="20" y2="26" stroke="#c9a96e" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="16" x2="20" y2="16" stroke="#c9a96e" stroke-width="0.8" opacity="0.6"/>
</svg>
